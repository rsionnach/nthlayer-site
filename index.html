function useScrollProgress(ref) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          const rect = entry.boundingClientRect;
          const vh = window.innerHeight;
          const p = Math.min(1, Math.max(0, (vh - rect.top) / (vh + rect.height)));
          setProgress(p);
        }
      },
      { threshold: Array.from({ length: 20 }, (_, i) => i / 19) }
    );
    observer.observe(el);
    const onScroll = () => {
      const rect = el.getBoundingClientRect();
      const vh = window.innerHeight;
      const p = Math.min(1, Math.max(0, (vh - rect.top) / (vh + rect.height)));
      setProgress(p);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => {
      observer.disconnect();
      window.removeEventListener("scroll", onScroll);
    };
  }, [ref]);
  return progress;
}

function useInView(ref, threshold = 0.15) {
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) setInView(true);
    }, { threshold });
    observer.observe(el);
    return () => observer.disconnect();
  }, [ref, threshold]);
  return inView;
}

function HeroParticles() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let frame;
    const particles = Array.from({ length: 20 }, () => ({
      x: Math.random() * 1200,
      y: Math.random() * 700,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      r: Math.random() * 1 + 0.5,
      opacity: Math.random() * 0.15 + 0.05,
    }));
    const draw = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(148,163,184,${p.opacity})`;
        ctx.fill();
      });
      frame = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(frame);
  }, []);
  return (
    <canvas ref={canvasRef} style={{
      position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none",
    }} />
  );
}

function ScenarioAnimation() {
  const containerRef = useRef(null);
  const stickyRef = useRef(null);
  const [step, setStep] = useState(-1);
  const [autoPlayed, setAutoPlayed] = useState(false);
  const autoTimerRef = useRef(null);
  const enteredView = useRef(false);

  // Scroll-driven progress
  useEffect(() => {
    const onScroll = () => {
      const el = containerRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const vh = window.innerHeight;
      const scrollableHeight = el.offsetHeight - vh;
      if (scrollableHeight <= 0) return;
      const scrolled = -rect.top;
      const progress = Math.max(0, Math.min(1, scrolled / scrollableHeight));

      // Only override auto-play if user has scrolled into the section
      if (rect.top < vh && rect.bottom > 0) {
        const newStep = Math.min(
          SCENARIO_STEPS.length - 1,
          Math.floor(progress * (SCENARIO_STEPS.length + 0.5))
        );
        if (autoPlayed || progress > 0.02) {
          setStep(newStep);
          // Stop auto-play if user scrolls
          if (autoTimerRef.current && progress > 0.05) {
            clearInterval(autoTimerRef.current);
            autoTimerRef.current = null;
          }
        }
      }
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [autoPlayed]);

  // Auto-play on enter view
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting && !enteredView.current) {
          enteredView.current = true;
          let currentStep = -1;
          autoTimerRef.current = setInterval(() => {
            currentStep++;
            if (currentStep >= SCENARIO_STEPS.length) {
              clearInterval(autoTimerRef.current);
              autoTimerRef.current = null;
              setAutoPlayed(true);
              return;
            }
            setStep(currentStep);
          }, 1800);
        }
      },
      { threshold: 0.3 }
    );
    observer.observe(el);
    return () => {
      observer.disconnect();
      if (autoTimerRef.current) clearInterval(autoTimerRef.current);
    };
  }, []);

  const currentStep = step >= 0 && step < SCENARIO_STEPS.length ? SCENARIO_STEPS[step] : null;

  return (
    <div
      id="scenario"
      ref={containerRef}
      style={{
        height: `${(SCENARIO_STEPS.length + 1) * 55}vh`,
        position: "relative",
      }}
    >
      <div
        ref={stickyRef}
        style={{
          position: "sticky",
          top: 80,
          height: "calc(100vh - 100px)",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          padding: "40px 24px",
        }}
      >
        {/* Section header */}
        <div
          style={{
            textAlign: "center",
            marginBottom: 48,
          }}
        >
          <div
            style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 11,
              letterSpacing: "0.15em",
              color: "#88c0d0",
              textTransform: "uppercase",
              fontWeight: 600,
              marginBottom: 12,
              opacity: step >= 0 ? 0.4 : 1,
              transition: "opacity 0.6s ease",
            }}
          >
            WATCH IT WORK
          </div>
          <h2
            style={{
              fontFamily: "'Instrument Serif', Georgia, serif",
              fontSize: 36,
              color: "#F0F0F3",
              fontWeight: 400,
              margin: 0,
            }}
          >
            One incident. Six layers. Full lifecycle.
          </h2>
        </div>

        {/* Node flow */}
        <div
          style={{
            display: "flex",
            alignItems: "center",
            gap: 0,
            maxWidth: 900,
            width: "100%",
            justifyContent: "center",
            marginBottom: 48,
          }}
        >
          {SCENARIO_NODES.map((node, i) => {
            const isActive =
              currentStep && currentStep.active.includes(node.id);
            const isPulsing =
              currentStep &&
              currentStep.pulse &&
              (currentStep.pulse.from === i || currentStep.pulse.to === i);
            const isTarget =
              currentStep && currentStep.pulse && currentStep.pulse.to === i;

            return (
              <div
                key={node.id}
                style={{ display: "flex", alignItems: "center", flex: 1 }}
              >
                <div
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    gap: 10,
                    minWidth: 80,
                    position: "relative",
                  }}
                >
                  {/* Glow ring */}
                  <div
                    style={{
                      position: "absolute",
                      top: -8,
                      width: 56,
                      height: 56,
                      borderRadius: node.isAgent ? "12px" : "50%",
                      background: isTarget
                        ? `radial-gradient(circle, ${node.color}25 0%, transparent 70%)`
                        : "transparent",
                      transition: "all 0.6s ease",
                    }}
                  />
                  {/* Node — circle for layers, dashed square for agent */}
                  <div
                    style={{
                      width: 40,
                      height: 40,
                      borderRadius: node.isAgent ? "10px" : "50%",
                      background: isActive
                        ? node.isAgent ? node.color + "08" : node.color + "20"
                        : "#0B1120",
                      border: node.isAgent
                        ? `2px dashed ${isActive ? node.color + "70" : "#1E2A3A"}`
                        : `2px solid ${isActive ? node.color : "#1E2A3A"}`,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      transition: "all 0.5s ease",
                      boxShadow: isTarget
                        ? `0 0 20px ${node.color}40, 0 0 40px ${node.color}15`
                        : "none",
                      position: "relative",
                      zIndex: 2,
                    }}
                  >
                    {node.isAgent ? (
                      <div style={{
                        fontFamily: "'JetBrains Mono', monospace",
                        fontSize: 14,
                        color: isActive ? node.color : "#1E2A3A",
                        transition: "all 0.5s ease",
                        lineHeight: 1,
                      }}>⬡</div>
                    ) : (
                    <div
                      style={{
                        width: 10,
                        height: 10,
                        borderRadius: "50%",
                        background: isActive ? node.color : "#1E2A3A",
                        transition: "all 0.5s ease",
                      }}
                    />
                    )}
                  </div>
                  <span
                    style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 10,
                      letterSpacing: "0.08em",
                      color: isActive ? node.color : "#2A3A4E",
                      transition: "color 0.5s ease",
                      fontWeight: 600,
                      fontStyle: node.isAgent ? "italic" : "normal",
                    }}
                  >
                    {node.name}
                  </span>
                </div>
                {/* Connector line */}
                {i < SCENARIO_NODES.length - 1 && (
                  <div
                    style={{
                      flex: 1,
                      height: 2,
                      marginLeft: 6,
                      marginRight: 6,
                      marginTop: -20,
                      position: "relative",
                      background: "#1E2A3A",
                      overflow: "visible",
                    }}
                  >
                    {/* Animated pulse */}
                    {currentStep &&
                      currentStep.pulse &&
                      currentStep.pulse.from === i && (
                        <div
                          key={step}
                          style={{
                            position: "absolute",
                            top: -3,
                            left: 0,
                            width: 8,
                            height: 8,
                            borderRadius: "50%",
                            background:
                              SCENARIO_NODES[currentStep.pulse.to].color,
                            boxShadow: `0 0 12px ${SCENARIO_NODES[currentStep.pulse.to].color}`,
                            animation: "pulseFly 0.8s ease-out forwards",
                          }}
                        />
                      )}
                    {/* Filled line for active connections */}
                    <div
                      style={{
                        position: "absolute",
                        top: 0,
                        left: 0,
                        height: "100%",
                        width:
                          currentStep && currentStep.active.includes(SCENARIO_NODES[i + 1]?.id)
                            ? "100%"
                            : "0%",
                        background: `linear-gradient(90deg, ${SCENARIO_NODES[i].color}80, ${SCENARIO_NODES[i + 1].color}80)`,
                        transition: "width 0.6s ease",
                      }}
                    />
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Event log / terminal */}
        <div
          style={{
            maxWidth: 700,
            width: "100%",
            background: "#080E1A",
            borderRadius: 12,
            border: `1px solid ${currentStep?.isAlert ? currentStep.color + "40" : "#1E2A3A"}`,
            overflow: "hidden",
            transition: "border-color 0.5s ease",
            boxShadow: currentStep?.isAlert
              ? `0 0 40px ${currentStep.color}10`
              : "0 20px 60px rgba(0,0,0,0.3)",
            minHeight: 180,
          }}
        >
          {/* Terminal header */}
          <div
            style={{
              padding: "10px 16px",
              borderBottom: "1px solid #1E2A3A",
              display: "flex",
              alignItems: "center",
              gap: 8,
            }}
          >
            <div
              style={{
                width: 8,
                height: 8,
                borderRadius: "50%",
                background: currentStep?.isAlert ? "#bf616a" : "#a3be8c",
                boxShadow: currentStep?.isAlert
                  ? "0 0 8px rgba(248,113,113,0.5)"
                  : "none",
                transition: "all 0.5s ease",
              }}
            />
            <span
              style={{
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 11,
                color: "#4A5568",
              }}
            >
              nthlayer — live scenario
            </span>
          </div>

          {/* Event content */}
          <div style={{ padding: "24px 28px" }}>
            {step < 0 ? (
              <div
                style={{
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 13,
                  color: "#2A3A4E",
                  textAlign: "center",
                  padding: "20px 0",
                }}
              >
                ▌ Waiting for scenario to begin...
              </div>
            ) : (
              currentStep && (
                <div
                  key={step}
                  style={{
                    animation: "fadeUp 0.4s ease-out",
                  }}
                >
                  <div
                    style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 11,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: currentStep.color,
                      fontWeight: 600,
                      marginBottom: 8,
                    }}
                  >
                    {currentStep.title}
                  </div>
                  <div
                    style={{
                      fontFamily: "'Inter', sans-serif",
                      fontSize: 15,
                      color: "#F0F0F3",
                      marginBottom: 10,
                      lineHeight: 1.6,
                    }}
                  >
                    {currentStep.event}
                  </div>
                  <div
                    style={{
                      fontFamily: "'JetBrains Mono', monospace",
                      fontSize: 12,
                      color: "#9CA3AF",
                      lineHeight: 1.7,
                      paddingLeft: 12,
                      borderLeft: `2px solid ${currentStep.color}40`,
                    }}
                  >
                    {currentStep.detail}
                  </div>
                </div>
              )
            )}
          </div>

          {/* Step indicators */}
          <div
            style={{
              padding: "12px 28px 16px",
              borderTop: "1px solid #1E2A3A",
              display: "flex",
              gap: 6,
              justifyContent: "center",
            }}
          >
            {SCENARIO_STEPS.map((_, i) => (
              <div
                key={i}
                style={{
                  width: i === step ? 24 : 6,
                  height: 6,
                  borderRadius: 3,
                  background:
                    i === step
                      ? SCENARIO_STEPS[i].color
                      : i < step
                        ? "#2A3A4E"
                        : "#1E2A3A",
                  transition: "all 0.4s ease",
                }}
              />
            ))}
          </div>
        </div>

        {/* Scroll hint */}
        {step < SCENARIO_STEPS.length - 1 && (
          <div
            style={{
              marginTop: 24,
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 11,
              color: "#2A3A4E",
              animation: "pulse 2s ease-in-out infinite",
            }}
          >
            ↓ scroll to advance
          </div>
        )}
      </div>

      {/* Keyframe animations */}
      <style>{`
        @keyframes pulseFly {
          0% { left: 0%; opacity: 1; }
          100% { left: calc(100% - 8px); opacity: 0.6; }
        }
        @keyframes fadeUp {
          0% { opacity: 0; transform: translateY(8px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.4; }
          50% { opacity: 0.8; }
        }
      `}</style>
    </div>
  );
}

          position: "relative", zIndex: 1, textAlign: "center",

          fontFamily: "'Inter', sans-serif", fontSize: 15, color: "#9CA3AF",
          lineHeight: 1.8, margin: 0,
        }}>
          Availability, latency, throughput — you've been measuring these for decades.
          But when an AI agent approves a bad loan, routes an incident to the wrong team,
          or generates a hallucinated recommendation, your dashboards stay green.
          NthLayer adds the missing dimension: judgment quality.
        </p>
