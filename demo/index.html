function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function hColor(h) {
  if (h > 0.75) { const t = (h - 0.75) / 0.25; return [lerp(235, 163, t), lerp(203, 190, t), lerp(139, 140, t)]; }
  if (h > 0.45) { const t = (h - 0.45) / 0.3; return [lerp(191, 235, t), lerp(97, 203, t), lerp(106, 139, t)]; }
  return [191, 97, 106];
}
function hRgb(h) { const c = hColor(h); return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }
function hRgba(h, a) { const c = hColor(h); return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

function shortName(id) {
  return id
    .replace("-service", "").replace("-svc", "").replace("-api", "")
    .replace("-pipeline", "").replace("-cluster", "").replace("-provider", "")
    .replace("-engine", "").replace("-detect", "").replace("-proc", "-proc")
    .replace("notification", "notify").replace("recommendation", "rec")
    .replace("analytics", "analytics").replace("feature-store", "feat-store");
}

    EDGES.forEach(e => {

      const eh = Math.min(s.h[e.from], s.h[e.to]);
      ctx.beginPath(); ctx.moveTo(cx + f.x * sc, cy + f.y * sc); ctx.lineTo(cx + t.x * sc, cy + t.y * sc);
      ctx.strokeStyle = hRgba(eh, e.critical ? 0.14 : 0.025);
      ctx.lineWidth = (e.critical ? 0.8 : 0.4) * sc; ctx.stroke();
    });

    // Ecosystem inter-component edges
    ECO_EDGES.forEach(e => {
      const f = pos(e.from), t = pos(e.to);
      const opacity = Math.min(s.ecoOpacity[e.from], s.ecoOpacity[e.to]);
      ctx.beginPath();
      ctx.moveTo(cx + f.x * sc, cy + f.y * sc);
      ctx.lineTo(cx + t.x * sc, cy + t.y * sc);
      ctx.strokeStyle = `rgba(136,192,208,${0.12 * opacity})`;
      ctx.lineWidth = 0.6 * sc;
      ctx.stroke();
    });

    // Particles — fade out on degraded edges (lower opacity, not random skip)
    s.particles.forEach(p => {
      const e = EDGES[p.ei]; const f = pos(e.from), t = pos(e.to);
      const eh = Math.min(s.h[e.from], s.h[e.to]);
      p.t += (p.spd * (0.3 + eh * 0.7) * dt) / 3000; if (p.t > 1) p.t -= 1;
      const x = cx + lerp(f.x, t.x, p.t) * sc, y = cy + lerp(f.y, t.y, p.t) * sc;
      // Degraded edges: particles fade and shrink smoothly instead of disappearing
      const pAlpha = eh < 0.6 ? eh * 0.8 : 1;
      const pSize = eh < 0.6 ? p.sz * (0.4 + eh * 0.6) : p.sz;
      ctx.beginPath(); ctx.arc(x, y, pSize * sc * 2, 0, 6.28); ctx.fillStyle = hRgba(eh, 0.08 * pAlpha); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y, pSize * sc, 0, 6.28); ctx.fillStyle = hRgba(eh, pAlpha); ctx.fill();
    });

    // Trace helper
    function drawTrace(paths, traceP, color) {
      const [r, g, b] = color === INC_AI ? [191, 97, 106] : [136, 192, 208];
      // Spawn one trace particle on a random path (not all paths at once)
      if (Math.random() < 0.015) {
        const pi = Math.floor(Math.random() * paths.length);
        traceP.push({ pi, t: 0, spd: 0.18 + Math.random() * 0.12 });
      }
      for (let i = traceP.length - 1; i >= 0; i--) { if (traceP[i].t > 1) traceP.splice(i, 1); }
      paths.forEach(path => {
        ctx.beginPath();
        path.forEach((nid, i) => { const p = pos(nid); i === 0 ? ctx.moveTo(cx + p.x * sc, cy + p.y * sc) : ctx.lineTo(cx + p.x * sc, cy + p.y * sc); });
        ctx.strokeStyle = `rgba(${r},${g},${b},${0.08 + Math.sin(s.time / 300) * 0.05})`;
        ctx.lineWidth = 1.5 * sc; ctx.setLineDash([3 * sc, 2 * sc]); ctx.stroke(); ctx.setLineDash([]);
      });
      traceP.forEach(tp => {
        tp.t += (tp.spd * dt) / 2000;
        const path = paths[tp.pi]; if (!path || path.length < 2) return;
        const segs = path.length - 1, sf = tp.t * segs, si = Math.min(Math.floor(sf), segs - 1), segT = sf - si;
        const fp = pos(path[si]), tp2 = pos(path[si + 1]);
        const x = cx + lerp(fp.x, tp2.x, segT) * sc, y = cy + lerp(fp.y, tp2.y, segT) * sc;
        ctx.beginPath(); ctx.arc(x, y, 3.5 * sc, 0, 6.28); ctx.fillStyle = `rgba(${r},${g},${b},0.12)`; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, 1.6 * sc, 0, 6.28); ctx.fillStyle = `rgba(${r},${g},${b},0.8)`; ctx.fill();
      });
    }

    if (s.traceAI) drawTrace(tracePathsAI, s.traceAI_P, INC_AI);
    if (s.traceInfra) drawTrace(tracePathsInfra, s.traceInfra_P, INC_INFRA);

    // Active signal lines
    for (let i = s.activeSignals.length - 1; i >= 0; i--) {
      const sig = s.activeSignals[i];
      if (sig.t < 1) {
        sig.t += (sig.spd * dt) / 2000;
        const px = lerp(sig.fromX, sig.toX, sig.t);
        const py = lerp(sig.fromY, sig.toY, sig.t);
        ctx.beginPath(); ctx.moveTo(sig.fromX, sig.fromY); ctx.lineTo(px, py);
        ctx.strokeStyle = sig.color + "55";
        ctx.lineWidth = 1.6 * sc;
        if (sig.dashed) { ctx.setLineDash([4 * sc, 3 * sc]); }
        ctx.stroke();
        if (sig.dashed) { ctx.setLineDash([]); }
        ctx.beginPath(); ctx.arc(px, py, 4 * sc, 0, 6.28);
        ctx.fillStyle = sig.color + "20"; ctx.fill();
        ctx.beginPath(); ctx.arc(px, py, 2 * sc, 0, 6.28);
        ctx.fillStyle = sig.color + "cc"; ctx.fill();
      } else if (sig.fadeT < 2500) {
        sig.fadeT += dt;
        const fadeAlpha = Math.max(0, 1 - sig.fadeT / 2500);
        const alphaHex = Math.round(fadeAlpha * 0x55).toString(16).padStart(2, "0");
        ctx.beginPath(); ctx.moveTo(sig.fromX, sig.fromY); ctx.lineTo(sig.toX, sig.toY);
        ctx.strokeStyle = sig.color + alphaHex;
        ctx.lineWidth = 1.6 * sc;
        if (sig.dashed) { ctx.setLineDash([4 * sc, 3 * sc]); }
        ctx.stroke();
        if (sig.dashed) { ctx.setLineDash([]); }
        if (sig.fadeT < dt * 2) {
          const eNode = ECOSYSTEM.find(e => e.id === sig.toId);
          if (eNode) s.ecoTargetOpacity[eNode.id] = 1.0;
        }
      } else {
        s.activeSignals.splice(i, 1);
      }
    }

    // Nodes
    let curH = null;
    SERVICES.forEach(sv => {
      const x = cx + sv.x * sc, y = cy + sv.y * sc, r = TIER_R[sv.tier] * sc;
      const h = s.h[sv.id], dc = DOMAIN_COLORS[sv.domain];
      const dx = mouse.current.x - x, dy = mouse.current.y - y;
      const isH = dx * dx + dy * dy < (r + 8) * (r + 8); if (isH) curH = sv.id;
      const dim = s.svcDim[sv.id] || 1.0;
      ctx.save(); ctx.globalAlpha = dim;

      if (h < 0.65) {
        ctx.beginPath(); ctx.arc(x, y, r + 5 * sc, 0, 6.28);
        ctx.fillStyle = `rgba(191,97,106,${(0.06 + Math.sin(s.time / 350) * 0.04) * (1 - h)})`;
        ctx.fill();
      }

      // Budget ring
      ctx.beginPath(); ctx.arc(x, y, r + 1.8 * sc, 0, 6.28);
      ctx.strokeStyle = "rgba(240,240,243,0.035)"; ctx.lineWidth = 1.8 * sc; ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, r + 1.8 * sc, -1.571, -1.571 + h * 6.283);
      ctx.strokeStyle = hRgb(h); ctx.lineWidth = 1.8 * sc; ctx.lineCap = "round"; ctx.stroke(); ctx.lineCap = "butt";

      // Body
      const ng = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, 0, x, y, r);
      ng.addColorStop(0, dc.glow + "60"); ng.addColorStop(1, dc.base + "20");
      ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fillStyle = ng; ctx.fill();
      ctx.strokeStyle = dc.base + (isH ? "dd" : "99"); ctx.lineWidth = (isH ? 1.4 : 0.9) * sc; ctx.stroke();

      // AI badge
      if (sv.type === "ai-gate") {
        const bx = x + r * 0.7, by = y - r * 0.7;
        // Glow
        ctx.beginPath(); ctx.arc(bx, by, 5.5 * sc, 0, 6.28);
        ctx.fillStyle = "rgba(235,203,139,0.12)"; ctx.fill();
        // Badge background
        ctx.beginPath(); ctx.arc(bx, by, 4 * sc, 0, 6.28);
        ctx.fillStyle = "#ebcb8b"; ctx.fill();
        // Text
        ctx.fillStyle = BG; ctx.font = `bold ${5 * sc}px 'JetBrains Mono',monospace`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("AI", bx, by + 0.3 * sc);
      }

      // External badge
      if (sv.platform === "external") {
        const bx = x - r * 0.8, by = y - r * 0.8;
        ctx.font = `bold ${4.5 * sc}px 'JetBrains Mono',monospace`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        const tw = ctx.measureText("EXT").width;
        ctx.fillStyle = "rgba(11,17,32,0.8)";
        ctx.fillRect(bx - tw / 2 - 2 * sc, by - 3 * sc, tw + 4 * sc, 6 * sc);
        ctx.fillStyle = "#a3be8c88";
        ctx.fillText("EXT", bx, by);
      }

      // LABEL — key fix: larger, high contrast, with dark background
      const label = shortName(sv.id);
      const fontSize = (isH ? 8.5 : 7.5) * sc;
      ctx.font = `${isH ? "bold " : ""}${fontSize}px 'JetBrains Mono',monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      const ly = y + r + 3 * sc;
      // Dark background behind label
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = "rgba(11,17,32,0.75)";
      ctx.fillRect(x - tw / 2 - 2, ly - 1, tw + 4, fontSize + 2);
      // Label text — colored by domain
      ctx.fillStyle = isH ? TEXT1 : dc.base + "bb";
      ctx.fillText(label, x, ly);
      ctx.restore();
    });

    // Ecosystem nodes
    ECOSYSTEM.forEach(en => {
      const x = cx + en.x * sc, y = cy + en.y * sc;
      const r = TIER_R.standard * sc;
      const opacity = s.ecoOpacity[en.id];
      const dx = mouse.current.x - x, dy = mouse.current.y - y;
      const isH = dx * dx + dy * dy < (r + 8) * (r + 8);
      if (isH) curH = en.id;

      ctx.globalAlpha = opacity;

      // Glow when active
      if (opacity > 0.6) {
        ctx.beginPath(); ctx.arc(x, y, r + 6 * sc, 0, 6.28);
        ctx.fillStyle = en.color + "15";
        ctx.fill();
      }

      if (en.shape === "diamond") {
        // Rotated square
        const ng = ctx.createRadialGradient(x, y - r * 0.2, 0, x, y, r);
        ng.addColorStop(0, en.color + "40"); ng.addColorStop(1, en.color + "0a");
        ctx.beginPath();
        ctx.moveTo(x, y - r); ctx.lineTo(x + r, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r, y);
        ctx.closePath();
        ctx.fillStyle = ng; ctx.fill();
        ctx.strokeStyle = en.color + (isH ? "cc" : "66");
        ctx.lineWidth = (isH ? 1.2 : 0.7) * sc; ctx.stroke();
      } else {
        // Cylinder (database)
        const cw = r * 1.2, ch = r * 1.6, ey = ch * 0.25;
        const ng = ctx.createRadialGradient(x, y, 0, x, y, r);
        ng.addColorStop(0, en.color + "40"); ng.addColorStop(1, en.color + "0a");
        // Body
        ctx.beginPath();
        ctx.moveTo(x - cw, y - ch / 2 + ey); ctx.lineTo(x - cw, y + ch / 2 - ey);
        ctx.quadraticCurveTo(x - cw, y + ch / 2 + ey, x, y + ch / 2 + ey);
        ctx.quadraticCurveTo(x + cw, y + ch / 2 + ey, x + cw, y + ch / 2 - ey);
        ctx.lineTo(x + cw, y - ch / 2 + ey);
        ctx.quadraticCurveTo(x + cw, y - ch / 2 - ey, x, y - ch / 2 - ey);
        ctx.quadraticCurveTo(x - cw, y - ch / 2 - ey, x - cw, y - ch / 2 + ey);
        ctx.closePath();
        ctx.fillStyle = ng; ctx.fill();
        ctx.strokeStyle = en.color + (isH ? "cc" : "66");
        ctx.lineWidth = (isH ? 1.2 : 0.7) * sc; ctx.stroke();
        // Top ellipse
        ctx.beginPath();
        ctx.ellipse(x, y - ch / 2 + ey, cw, ey, 0, 0, 6.28);
        ctx.strokeStyle = en.color + (isH ? "cc" : "44");
        ctx.lineWidth = 0.5 * sc; ctx.stroke();
      }

      // Label — brand colour
      const label = en.label;
      const fontSize = (isH ? 7.5 : 7) * sc;
      ctx.font = `${isH ? "bold " : ""}${fontSize}px 'JetBrains Mono',monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      const ly = y + r + 4 * sc;
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = "rgba(11,17,32,0.75)";
      ctx.fillRect(x - tw / 2 - 2, ly - 1, tw + 4, fontSize + 2);
      ctx.fillStyle = en.color + (isH ? "ff" : "aa");
      ctx.fillText(label, x, ly);

      ctx.globalAlpha = 1;
    });

    if (curH !== s.hovered) { s.hovered = curH; setHovered(curH); }
    frame.current = requestAnimationFrame(animate);
  }, [tracePathsAI, tracePathsInfra, pos]);

  useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const resize = () => {
      const p = c.parentElement; const dpr = window.devicePixelRatio || 1;
      c.width = p.clientWidth * dpr; c.height = p.clientHeight * dpr;
      c.style.width = p.clientWidth + "px"; c.style.height = p.clientHeight + "px";
      c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    const ro = new ResizeObserver(resize); ro.observe(c.parentElement);
    frame.current = requestAnimationFrame(animate);
    return () => { ro.disconnect(); if (frame.current) cancelAnimationFrame(frame.current); };
  }, [animate]);

  const onMouse = useCallback(e => {
    const r = canvasRef.current?.getBoundingClientRect();
    if (r) mouse.current = { x: e.clientX - r.left, y: e.clientY - r.top };
  }, []);

  const go = useCallback(() => {
    const s2 = st.current;
    s2.playing = true; s2.pi = 0; s2.pt = 0; s2.time = 0;
    s2.events = [...PHASES[0].events];
    s2.traceAI = false; s2.traceInfra = false; s2.traceAI_P = []; s2.traceInfra_P = [];
    lt.current = null;
    SERVICES.forEach(sv => { s2.h[sv.id] = 1; s2.ht[sv.id] = 1; });
    ECOSYSTEM.forEach(en => {
      const init = en.id === "nthlayer-generate" ? 0.8 : 0.3;
      s2.ecoOpacity[en.id] = init; s2.ecoTargetOpacity[en.id] = init;
    });
    s2.activeSignals = []; s2.pendingSignals = [];
    // Queue Phase 0 signals
    s2.pendingSignals = (PHASES[0].signals || []).map(sig => ({ ...sig, fired: false }));
    setPhase(0); setEvents([...PHASES[0].events]); setStarted(true); setPlaying(true); setFinished(false);
  }, []);

  const toggle = useCallback(() => {
    if (!started) { go(); return; }
    const s2 = st.current;
    if (!s2.playing && s2.pi >= PHASES.length - 1) { go(); return; }
    s2.playing = !s2.playing; setPlaying(s2.playing);
  }, [started, go]);

  const cp = PHASES[phase];
  const hovSvc = hovered ? SERVICES.find(s => s.id === hovered) : null;
  const hovEco = hovered ? ECOSYSTEM.find(e => e.id === hovered) : null;
  const hovH = hovered ? st.current.h[hovered] : 1;
  const FONT = "'JetBrains Mono',monospace";

  return (
    <div style={{ width: isLiveMode && panelOpen ? "calc(100% - 360px)" : "100%", height: (isLiveMode || isGuidedMode) ? "100vh" : "calc(100vh - 64px)", minHeight: 400, background: BG, position: "relative", overflow: "hidden", fontFamily: FONT, transition: "width 0.3s ease" }}>
      <div style={{ position: "absolute", inset: 0 }}>
        <canvas ref={canvasRef} onMouseMove={onMouse} style={{ display: "block", cursor: hovered ? "pointer" : "default" }} />
      </div>

      {/* Header */}
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "7px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", background: `linear-gradient(to bottom,rgba(11,17,32,0.93),transparent)`, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 5, height: 5, borderRadius: "50%", background: playing ? "#a3be8c" : ACCENT, boxShadow: `0 0 6px ${playing ? "#a3be8c" : ACCENT}` }} />
        </div>
        {isLiveMode && (
          <button onClick={() => { setPanelOpen(v => { if (v) st.current._userClosed = Date.now(); return !v; }); }} title="Toggle panel (p)" style={{
            width: 28, height: 28, borderRadius: 4, border: `1px solid ${BORDER}`,
            background: panelOpen ? "rgba(136,192,208,0.12)" : "rgba(11,17,32,0.6)",
            color: panelOpen ? ACCENT : TEXT3, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 14, fontWeight: 700, lineHeight: 1, transition: "all 0.2s",
          }}>{"\u2261"}</button>
        )}
        {!isLiveMode && !isGuidedMode && <div />}
      </div>

      {/* Guided mode: top bar */}
      {isGuidedMode && (
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, zIndex: 20,
          background: "rgba(11,17,32,0.95)", borderBottom: `1px solid ${BORDER}`,
          padding: "12px 20px",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#a3be8c", boxShadow: "0 0 8px #a3be8c" }} />
              <span style={{ color: "#a3be8c", fontSize: 12, fontWeight: 700, letterSpacing: 1.5 }}>GUIDED DEMO</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ color: TEXT3, fontSize: 11 }}>Step {guidedStep + 1} of {GUIDED_STEPS.length}</span>
              <button onClick={() => setGuidedStep(prev => Math.min(prev + 1, GUIDED_STEPS.length - 1))}
                disabled={guidedStep >= GUIDED_STEPS.length - 1}
                style={{
                  background: "rgba(136,192,208,0.1)", border: `1px solid ${BORDER}`,
                  color: guidedStep >= GUIDED_STEPS.length - 1 ? TEXT3 : TEXT1,
                  padding: "4px 12px", borderRadius: 4, cursor: guidedStep >= GUIDED_STEPS.length - 1 ? "default" : "pointer",
                  fontSize: 12, fontFamily: FONT,
                }}>{"\u25b6 Next"}</button>
            </div>
          </div>
          <div style={{ color: TEXT2, fontSize: 14, marginTop: 6, lineHeight: 1.4 }}>
            {GUIDED_STEPS[guidedStep]?.desc}
          </div>
        </div>
      )}

      {/* Phase / Live status */}
      {isLiveMode ? (
        <div style={{ position: "absolute", top: 24, left: 12, zIndex: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: liveStatus.includes("HEALTHY") ? "#a3be8c" : "#bf616a", boxShadow: `0 0 8px ${liveStatus.includes("HEALTHY") ? "#a3be8c" : "#bf616a"}`, animation: "pulse 2s infinite" }} />
            <span style={{ color: liveStatus.includes("HEALTHY") ? "#a3be8c" : "#bf616a", fontSize: 13, fontWeight: 700, letterSpacing: 1.8 }}>
              {liveStatus}
            </span>
          </div>
          <div style={{ color: TEXT3, fontSize: 9, letterSpacing: 0.3 }}>LIVE · polling {prometheusUrl} · verdict store active</div>
        </div>
      ) : isGuidedMode ? null : started && (
        <div style={{ position: "absolute", top: 30, left: 12, zIndex: 10, maxWidth: 680 }}>
          <div style={{ color: cp.color, fontSize: 11, fontWeight: 700, letterSpacing: 1.8, display: "flex", alignItems: "center", gap: 5 }}>
            {(cp.color === "#bf616a" || cp.color === "#ebcb8b") && <span style={{ width: 5, height: 5, borderRadius: "50%", background: cp.color, animation: "pulse 1s infinite", display: "inline-block" }} />}
            {cp.label}
          </div>
          <div style={{ color: TEXT4, fontSize: 10, lineHeight: 1.3, marginTop: 3 }}>{cp.desc}</div>
        </div>
      )}

      {/* Incident legend — hidden in live/guided mode */}
      {!isLiveMode && !isGuidedMode && (phase === 2 || phase === 3) && started && (
        <div style={{ position: "absolute", top: 26, right: 12, zIndex: 10, display: "flex", flexDirection: "column", gap: 2 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 8, height: 2, background: INC_AI, borderRadius: 1 }} />
            <span style={{ color: TEXT4, fontSize: 10 }}>INC-4821 model</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <div style={{ width: 10, height: 2, background: INC_INFRA, borderRadius: 1 }} />
            <span style={{ color: TEXT4, fontSize: 10 }}>INC-4822 config</span>
          </div>
        </div>
      )}

      {/* Events — only shown in scripted mode (live mode uses the panel, guided uses overlay cards) */}
      {events.length > 0 && !isLiveMode && !isGuidedMode && (
        <div style={{
          position: "absolute",
          bottom: 42, left: 12, zIndex: 10, display: "flex", flexDirection: "column", gap: 2, maxWidth: "72%",
        }}>
          {events.map((ev, i) => {
            const isCurrent = i >= events.length - (PHASES[phase]?.events?.length || 0);
            const nthBg = isCurrent ? "rgba(136,192,208,0.10)" : "rgba(136,192,208,0.04)";
            const plainBg = isCurrent ? "rgba(11,17,32,0.75)" : "rgba(11,17,32,0.4)";
            return (
              <div key={i} style={{
                display: "flex", gap: 6, alignItems: "flex-start",
                color: isCurrent ? TEXT2 : TEXT3,
                fontSize: 10, padding: "4px 8px",
                background: ev.nth ? nthBg : plainBg,
                borderLeft: `2px solid ${ev.nth ? ACCENT : ev.color}`, borderRadius: "0 2px 2px 0", lineHeight: 1.35,
              }}>
                <span style={{ color: ev.nth ? ACCENT : ev.color, fontSize: 8.5, fontWeight: 700, flexShrink: 0, marginTop: 1, letterSpacing: 0.3 }}>
                  {ev.nth ? `◆ nthlayer-${ev.tag}` : ev.tag}
                </span>
                <span onClick={(e) => {
                  if (ev.text.length > 80) {
                    e.stopPropagation();
                    setExpandedEvents(prev => {
                      const next = new Set(prev);
                      next.has(i) ? next.delete(i) : next.add(i);
                      return next;
                    });
                  }
                }} style={{ cursor: ev.text.length > 80 ? "pointer" : "default" }}>
                  {expandedEvents.has(i) || ev.text.length <= 80
                    ? ev.text
                    : ev.text.slice(0, 80).replace(/\s+\S*$/, '') + '\u2026'}
                  {ev.text.length > 80 && <span style={{ color: TEXT3, fontSize: 7, marginLeft: 3 }}>{expandedEvents.has(i) ? '\u25b2' : '\u25bc'}</span>}
                </span>
              </div>
            );
          })}
        </div>
      )}

      {/* Hover */}
      {(hovSvc || hovEco) && (
        <div style={{ position: "absolute", bottom: 42, right: 12, zIndex: 10, background: "rgba(11,17,32,0.9)", border: `1px solid ${BORDER}`, borderRadius: 5, padding: "5px 9px", minWidth: 105, backdropFilter: "blur(6px)" }}>
          <div style={{ color: TEXT1, fontSize: 8.5, fontWeight: 600, marginBottom: 3 }}>{hovSvc ? hovSvc.id : hovEco.id}</div>

                  return <div key={i} style={{ flex: p.dur, height: 2, borderRadius: 1, background: prog >= 1 ? ACCENT : prog > 0 ? `linear-gradient(to right,${ACCENT} ${prog * 100}%,${BORDER} ${prog * 100}%)` : BORDER }} />;

                  <span style={{ width: 8, height: 8, borderRadius: "50%", display: "inline-block", background: infraHealth.grafana ? "#a3be8c" : "#bf616a" }} />

        <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexShrink: 0 }}>

            <span style={{ color: ACCENT, fontSize: 14, fontWeight: 300 }}>{ECOSYSTEM.length}</span>
          </div>
        </div>
      </div>

      {/* Start overlay */}
      {!started && !isLiveMode && !isGuidedMode && (

          <div style={{ color: TEXT3, fontSize: 9.5, lineHeight: 1.4, marginBottom: 24, maxWidth: 420, textAlign: "center" }}>Watch NthLayer detect, separate, and resolve two concurrent incidents across a multi-cloud topology.</div>
          <div style={{ width: 44, height: 44, borderRadius: "50%", border: `1px solid rgba(136,192,208,0.3)`, background: "rgba(136,192,208,0.06)", display: "flex", alignItems: "center", justifyContent: "center", color: TEXT1, fontSize: 16, marginBottom: 14 }}>▶</div>
          <div style={{ color: TEXT3, fontSize: 10, letterSpacing: 0.6 }}>CLICK TO START SCENARIO</div>

      {/* Closing summary overlay */}
      {finished && !isLiveMode && !isGuidedMode && (

              { value: "1", label: "DEPLOY BLOCKED", sub: "loop closed, repeat prevented" },

            {verdicts.slice(0, 8).map((v, i) => {
              const vtype = v.subject?.type || 'unknown';
              const vcolor = VERDICT_COLORS[vtype] || TEXT2;
              const ts = (v.timestamp || '').slice(11, 19);
              const rawSummary = v.subject?.summary || v.subject?.ref || '';
              const isExpanded = expandedVerdicts.has(i);
              const isTruncatable = rawSummary.length > 120;
              const summary = isExpanded || !isTruncatable ? rawSummary : rawSummary.slice(0, 120).replace(/\s+\S*$/, '') + '\u2026';

              const custom = v.metadata?.custom || {};
              return (
                <div key={i} onClick={() => {

                    next.has(i) ? next.delete(i) : next.add(i);
                    return next;
                  });
                }} style={{
                  margin: "8px 12px", padding: "10px 14px", borderRadius: 6,
                  border: `1px solid ${vcolor}30`, borderLeft: `3px solid ${vcolor}`,
                  background: "rgba(11,17,32,0.6)",

                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ color: vcolor, fontSize: 10, fontWeight: 700, letterSpacing: 0.5 }}>{vtype.toUpperCase()}</span>
                    <span style={{ color: TEXT3, fontSize: 9 }}>{ts}</span>
                  </div>
                  <div style={{ color: TEXT2, fontSize: 10, lineHeight: 1.4, marginBottom: 3, wordBreak: "break-word" }}>
                    {summary}

                  </div>
                  {vtype === 'evaluation' && custom.breach !== undefined && (
                    <div style={{ color: custom.breach ? '#bf616a' : '#a3be8c', fontSize: 9, marginBottom: 2 }}>
                      {custom.slo_name || ''} {"\u00b7"} {custom.breach ? '\u26a0 BREACH' : '\u2713 OK'}

                    </div>
                  )}
                  {vtype === 'correlation' && custom.root_causes?.length > 0 && (
                    <div style={{ color: '#ebcb8b', fontSize: 9, marginBottom: 2 }}>

                    </div>
                  )}
                  {vtype === 'retrospective' && (
                    <div style={{ color: '#a3be8c', fontSize: 9, marginBottom: 2 }}>
                      {custom.duration_minutes ? `${custom.duration_minutes.toFixed(0)}m` : ''} {"\u00b7"} {custom.decisions_affected || 0} decisions
                    </div>

                  <div style={{ color: TEXT3, fontSize: 9 }}>{"\u25b6"} {producer} {"\u00b7"} conf {conf.toFixed(2)}</div>
                </div>
              );
            })}
          </div>

          {/* Metrics strip */}

              {[
                { label: "REVERSAL", value: liveMetrics.reversalRate, target: 0.015, mul: 100 },
                { label: "ERROR", value: liveMetrics.errorRate, target: 0.01, mul: 100 },
                { label: "ALERTS", value: liveMetrics.alertCount, target: null, mul: 1 },
              ].map((m, i) => {
                const val = m.value != null ? m.value * m.mul : null;
                const color = m.target == null
                  ? (m.value > 0 ? '#bf616a' : '#a3be8c')
                  : (m.value == null ? TEXT3 : m.value > m.target ? '#bf616a' : m.value > m.target * 0.8 ? '#ebcb8b' : '#a3be8c');
                return (
                  <span key={i} style={{ color: TEXT3 }}>
                    {m.label}{" "}
                    <span style={{ color, fontWeight: 600 }}>
                      {val != null ? (m.mul === 100 ? val.toFixed(1) + '%' : val) : 'n/a'}
                    </span>
                    {m.value != null && m.target != null && <span style={{ color }}>{m.value > m.target ? ' \u26a0' : ' \u2713'}</span>}
                    {m.target != null && <span style={{ color: TEXT3, fontSize: 8 }}> {"<"}{(m.target * 100).toFixed(1)}%</span>}
                  </span>
                );
              })}
            </div>
          </div>

        </div>

      {/* Guided mode: bottom controls */}
      {isGuidedMode && (
        <div style={{

          <button onClick={() => setGuidedStep(prev => Math.max(prev - 1, 0))}

              background: "rgba(136,192,208,0.08)", border: `1px solid ${BORDER}`,

              color: guidedStep >= GUIDED_STEPS.length - 1 ? TEXT3 : TEXT1,
              padding: "6px 14px", borderRadius: 4, cursor: guidedStep >= GUIDED_STEPS.length - 1 ? "default" : "pointer",

            }}>{"\u25b6 Next"}</button>
          <button onClick={() => setGuidedPlaying(prev => !prev)}
            style={{
              background: guidedPlaying ? "rgba(163,190,140,0.15)" : "rgba(136,192,208,0.08)",

              color: guidedPlaying ? "#a3be8c" : TEXT2,
              padding: "6px 14px", borderRadius: 4, cursor: "pointer",
              fontSize: 12, fontFamily: FONT,
            }}>{guidedPlaying ? "\u23f8 Pause" : "\u25b6\u25b6 Play All"}</button>
          <button onClick={() => { setGuidedStep(0); setGuidedPlaying(false); }}
            style={{
              background: "rgba(136,192,208,0.08)", border: `1px solid ${BORDER}`,
              color: TEXT2, padding: "6px 14px", borderRadius: 4, cursor: "pointer",
              fontSize: 12, fontFamily: FONT,
            }}>{"\u21bb Restart"}</button>
          <span style={{ color: TEXT3, fontSize: 10, marginLeft: 12 }}>
            Keys: {"\u2190\u2192"} navigate {"\u00b7"} Space next {"\u00b7"} P play {"\u00b7"} R restart
          </span>
        </div>
      )}

      {/* Guided mode: overlay card + connector */}
      {isGuidedMode && guidedStep > 0 && guidedStep < GUIDED_STEPS.length - 1 && (() => {
        const stepDef = GUIDED_STEPS[guidedStep];
        const verdict = getVerdictForStep(guidedStep, verdictQueue);
        const anchorId = stepDef.anchor;
        if (!anchorId) return null;

        const anchorNode = pos(anchorId);
        const { cx: lcx, cy: lcy, sc: lsc } = canvasLayout.current;
        const sx = lcx + anchorNode.x * lsc;
        const sy = lcy + anchorNode.y * lsc;

        let cardX = sx + 60;
        let cardY = sy - 100;
        if (cardX + 420 > window.innerWidth - 50) cardX = sx - 420 - 60;
        if (cardY < 80) cardY = 80;
        if (cardY + 300 > window.innerHeight - 60) cardY = window.innerHeight - 360;

        const vtype = stepDef.type;
        const vcolor = VERDICT_COLORS[vtype] || TEXT2;
        const custom = verdict?.metadata?.custom || {};
        const judgment = verdict?.judgment || {};

        return (
          <React.Fragment>
            {/* Connector SVG */}
            <svg style={{ position: "absolute", inset: 0, zIndex: 18, pointerEvents: "none" }}>
              <line
                x1={sx} y1={sy}
                x2={cardX < sx ? cardX + 420 : cardX}
                y2={cardY + 40}
                stroke="rgba(136,192,208,0.2)" strokeWidth="1" strokeDasharray="4,3"
              />
            </svg>

            {/* Overlay card */}
            <div style={{
              position: "absolute", left: cardX, top: cardY, zIndex: 19,
              maxWidth: 420, minWidth: 280,
              background: "rgba(11,17,32,0.95)", borderRadius: 8,
              border: `1px solid ${vcolor}40`,
              borderLeft: `4px solid ${vcolor}`,

              backdropFilter: "blur(8px)",
              boxShadow: `0 8px 32px rgba(0,0,0,0.4), 0 0 1px ${vcolor}30`,

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ color: vcolor, fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>{vtype.toUpperCase()}</span>
                {verdict && <span style={{ color: TEXT3, fontSize: 10 }}>{(verdict.timestamp || '').slice(11, 19)}</span>}
              </div>

              {/* Step 1 intro note */}
              {guidedStep === 1 && !verdict && (
                <div style={{ color: TEXT4, fontSize: 13, lineHeight: 1.5, marginBottom: 8, fontStyle: "italic" }}>
                  Run the scenario first (<span style={{ color: ACCENT }}>./demo.sh scenario</span>), then open this page to step through the results.
                </div>
              )}

              {verdict ? (
                <div>
                  {/* Summary */}
                  <div style={{ color: TEXT2, fontSize: 14, lineHeight: 1.5, marginBottom: 10 }}>
                    {verdict.subject?.summary || verdict.subject?.ref || ''}
                  </div>

                  {/* Type-specific details */}
                  {vtype === 'evaluation' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.service && <div style={{ color: TEXT3, fontSize: 13 }}>Service: <span style={{ color: TEXT2 }}>{custom.service}</span></div>}
                      {custom.slo_name && <div style={{ color: TEXT3, fontSize: 13 }}>SLO: <span style={{ color: TEXT2 }}>{custom.slo_name}</span></div>}
                      {custom.current_value !== undefined && custom.target !== undefined && (
                        <div style={{ color: TEXT3, fontSize: 13 }}>
                          Current: <span style={{ color: custom.breach ? '#bf616a' : '#a3be8c', fontWeight: 600 }}>{(custom.current_value * 100).toFixed(1)}%</span>
                          {" "} Target: <span style={{ color: TEXT2 }}>{(custom.target * 100).toFixed(1)}%</span>
                        </div>
                      )}
                      <div style={{ color: custom.breach ? '#bf616a' : '#a3be8c', fontSize: 13, fontWeight: 600 }}>
                        {custom.breach ? '\u26a0 BREACH' : '\u2713 Within target'}
                        {custom.consecutive !== undefined && ` \u00b7 Consecutive: ${custom.consecutive}`}
                      </div>
                    </div>
                  )}

                  {vtype === 'correlation' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.root_causes?.length > 0 && (
                        <div style={{ color: TEXT3, fontSize: 13 }}>Root cause: <span style={{ color: '#ebcb8b' }}>{custom.root_causes[0].service || '?'} ({custom.root_causes[0].type || '?'})</span></div>
                      )}
                      {custom.blast_radius?.length > 0 && (
                        <div style={{ color: TEXT3, fontSize: 13 }}>Blast radius: <span style={{ color: TEXT2 }}>{custom.blast_radius.map(b => b.service || b).join(', ')}</span></div>
                      )}
                      {custom.reasoning && <div style={{ color: TEXT4, fontSize: 12, marginTop: 4, lineHeight: 1.4 }}>{custom.reasoning}</div>}
                    </div>
                  )}

                  {vtype === 'triage' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.severity && <div style={{ color: TEXT3, fontSize: 13 }}>Severity: <span style={{ color: custom.severity === 'critical' ? '#bf616a' : '#ebcb8b', fontWeight: 600 }}>{custom.severity}</span></div>}
                      {custom.team && <div style={{ color: TEXT3, fontSize: 13 }}>Team: <span style={{ color: TEXT2 }}>{custom.team}</span></div>}
                      {custom.affected_slos?.length > 0 && (
                        <div style={{ color: TEXT3, fontSize: 13 }}>Affected SLOs: <span style={{ color: TEXT2 }}>{custom.affected_slos.join(', ')}</span></div>
                      )}
                    </div>
                  )}

                  {vtype === 'investigation' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.root_cause && <div style={{ color: TEXT3, fontSize: 13 }}>Root cause: <span style={{ color: TEXT2 }}>{custom.root_cause}</span></div>}
                      {judgment.confidence !== undefined && (
                        <div style={{ color: TEXT3, fontSize: 13 }}>Confidence: <span style={{ color: judgment.confidence > 0.8 ? '#a3be8c' : '#ebcb8b', fontWeight: 600 }}>{(judgment.confidence * 100).toFixed(0)}%</span></div>
                      )}
                      {custom.hypotheses?.length > 0 && (
                        <div style={{ color: TEXT4, fontSize: 12, marginTop: 4 }}>
                          {custom.hypotheses.slice(0, 3).map((h, i) => <div key={i}>- {h}</div>)}
                        </div>
                      )}
                    </div>
                  )}

                  {vtype === 'communication' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.title && <div style={{ color: TEXT3, fontSize: 13 }}>Status page: <span style={{ color: TEXT2 }}>{custom.title}</span></div>}
                    </div>
                  )}

                  {vtype === 'remediation' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.action && <div style={{ color: TEXT3, fontSize: 13 }}>Action: <span style={{ color: TEXT2 }}>{custom.action}</span></div>}
                      {custom.rationale && <div style={{ color: TEXT4, fontSize: 12, lineHeight: 1.4 }}>{custom.rationale}</div>}
                      {custom.approval_status && (
                        <div style={{ color: custom.approval_status === 'approved' ? '#a3be8c' : '#ebcb8b', fontSize: 13, fontWeight: 600 }}>
                          {custom.approval_status === 'approved' ? '\u2713 Approved' : '\u23f3 ' + custom.approval_status}
                        </div>
                      )}
                    </div>
                  )}

                  {vtype === 'retrospective' && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {custom.duration_minutes && <div style={{ color: TEXT3, fontSize: 13 }}>Duration: <span style={{ color: TEXT2 }}>{custom.duration_minutes.toFixed(0)}m</span></div>}
                      {custom.decisions_affected !== undefined && <div style={{ color: TEXT3, fontSize: 13 }}>Decisions affected: <span style={{ color: TEXT2 }}>{custom.decisions_affected}</span></div>}
                      {custom.verdict_count !== undefined && <div style={{ color: TEXT3, fontSize: 13 }}>Verdict count: <span style={{ color: TEXT2 }}>{custom.verdict_count}</span></div>}
                      {custom.recommendation && <div style={{ color: '#a3be8c', fontSize: 13, marginTop: 4 }}>{custom.recommendation}</div>}
                    </div>
                  )}

                  {/* Confidence footer */}
                  {judgment.confidence !== undefined && vtype !== 'investigation' && (
                    <div style={{ color: TEXT3, fontSize: 11, marginTop: 8, paddingTop: 6, borderTop: `1px solid ${BORDER}` }}>
                      {verdict.producer?.system || ''} {"\u00b7"} confidence {judgment.confidence.toFixed(2)}
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ color: TEXT3, fontSize: 13, lineHeight: 1.5 }}>
                  Waiting for verdict...
                  {guidedStep === 1 && (
                    <div style={{ color: TEXT4, fontSize: 12, marginTop: 8 }}>
                      No verdicts found yet. Run <span style={{ color: ACCENT }}>./demo.sh scenario</span> to generate verdicts, then refresh this page.
                    </div>
                  )}
                </div>
              )}
            </div>
          </React.Fragment>
        );
      })()}

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

function SiteFooter() {

      display: "flex", justifyContent: "space-between", alignItems: "center",
      maxWidth: 1100, margin: "0 auto",

          { label: "GitHub", href: "https://github.com/rsionnach" },

          { label: "robfox.dev", href: "https://robfox.dev" },
        ].map((link) => (
          <a key={link.label} href={link.href} target="_blank" rel="noopener" style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
            color: "#6B7F99", textDecoration: "none",
          }}>{link.label}</a>
        ))}
      </div>
    </footer>
  );
}

function DemoPage() {
  const params = new URLSearchParams(window.location.search);
  const isLive = params.get('mode') === 'live';
  const isGuided = params.get('mode') === 'guided';
  return (
    <div style={{ background: "#0B1120", minHeight: "100vh" }}>
      {!isLive && !isGuided && <SiteNav />}
      <NthLayerViz />
      {!isLive && !isGuided && <SiteFooter />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DemoPage));
