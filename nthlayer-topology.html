function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function hColor(h) {
  if (h > 0.75) { const t = (h - 0.75) / 0.25; return [lerp(235, 163, t), lerp(203, 190, t), lerp(139, 140, t)]; }
  if (h > 0.45) { const t = (h - 0.45) / 0.3; return [lerp(191, 235, t), lerp(97, 203, t), lerp(106, 139, t)]; }
  return [191, 97, 106];
}
function hRgb(h) { const c = hColor(h); return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }
function hRgba(h, a) { const c = hColor(h); return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

function shortName(id) {
  return id
    .replace("-service", "").replace("-svc", "").replace("-api", "")
    .replace("-pipeline", "").replace("-cluster", "").replace("-provider", "")
    .replace("-engine", "").replace("-detect", "").replace("-proc", "-proc")
    .replace("notification", "notify").replace("recommendation", "rec")
    .replace("analytics", "analytics").replace("feature-store", "feat-store");
}

function NthLayerViz() {
  const canvasRef = useRef(null);
  const st = useRef({
    h: Object.fromEntries(SERVICES.map(s => [s.id, 1])),
    ht: Object.fromEntries(SERVICES.map(s => [s.id, 1])),
    particles: [],
    traceAI_P: [], traceInfra_P: [],
    traceAI: false, traceInfra: false,
    time: 0, pi: 0, pt: 0, playing: false,
    events: [], hovered: null,
    ecoOpacity: Object.fromEntries(ECOSYSTEM.map(e => [e.id, 0.3])),
    ecoTargetOpacity: Object.fromEntries(ECOSYSTEM.map(e => [e.id, 0.3])),
    activeSignals: [],
  });
  const [phase, setPhase] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [started, setStarted] = useState(false);
  const [events, setEvents] = useState([]);
  const [hovered, setHovered] = useState(null);
  const mouse = useRef({ x: -999, y: -999 });
  const frame = useRef(null);
  const lt = useRef(null);

  useEffect(() => {
    const p = [];
    EDGES.forEach((e, i) => {
      for (let j = 0; j < (e.critical ? 4 : 2); j++)
        p.push({ ei: i, t: Math.random(), spd: 0.1 + Math.random() * 0.1, sz: e.critical ? 1.4 : 0.9 });
    });
    st.current.particles = p;
  }, []);

  const tracePathsAI = useMemo(() => {
    const paths = [];
    ["payment-api", "checkout-svc", "order-service", "payment-proc", "billing-svc"].forEach(tgt => {
      const vis = new Set(); const q = [[tgt]];
      while (q.length) {
        const path = q.shift(); const cur = path[path.length - 1];
        if (cur === "fraud-detect") { paths.push([...path].reverse()); break; }
        if (vis.has(cur)) continue; vis.add(cur);
        EDGES.forEach(e => { if (e.from === cur && !vis.has(e.to)) q.push([...path, e.to]); });
      }
    });
    return paths;
  }, []);

  const tracePathsInfra = useMemo(() => {
    const paths = [];
    ["profile-service", "notification-svc", "search-service", "api-gateway", "cache-cluster"].forEach(tgt => {
      const vis = new Set(); const q = [[tgt]];
      while (q.length) {
        const path = q.shift(); const cur = path[path.length - 1];
        if (cur === "config-service") { paths.push([...path].reverse()); break; }
        if (vis.has(cur)) continue; vis.add(cur);
        EDGES.forEach(e => { if (e.from === cur && !vis.has(e.to)) q.push([...path, e.to]); });
      }
    });
    return paths;
  }, []);

  const pos = useCallback(id => {
    const svc = SERVICES.find(s => s.id === id);
    if (svc) return svc;
    return ECOSYSTEM.find(e => e.id === id) || { x: 0, y: 0 };
  }, []);

  const animate = useCallback(ts => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const W = c.width / dpr, H = c.height / dpr;
    const cx = W / 2, cy = H / 2 + 5;
    const sc = Math.min(W / 750, H / 520) * 0.92;
    if (!lt.current) lt.current = ts;
    const dt = Math.min(ts - lt.current, 50); lt.current = ts;
    const s = st.current; s.time += dt;

    if (s.playing) {
      s.pt += dt;
      if (s.pt >= PHASES[s.pi].dur) {
        if (s.pi < PHASES.length - 1) {
          s.pi++; s.pt = 0; setPhase(s.pi);
          const np = PHASES[s.pi];
          SERVICES.forEach(sv => { s.ht[sv.id] = 1; });
          Object.entries(np.overrides).forEach(([id, v]) => { s.ht[id] = v; });
          s.traceAI = !!np.traceAI; s.traceInfra = !!np.traceInfra;
          s.traceAI_P = []; s.traceInfra_P = [];
          // Set ecosystem opacity targets
          ECOSYSTEM.forEach(en => { s.ecoTargetOpacity[en.id] = 0.3; });
          (np.ecoActivate || []).forEach(id => { s.ecoTargetOpacity[id] = 1.0; });
          // Queue signal lines
          s.pendingSignals = (np.signals || []).map(sig => ({ ...sig, fired: false }));
          if (np.events.length) {
            s.events = [...s.events, ...np.events].slice(-3);
            setEvents([...s.events]);
          }
        } else { s.playing = false; setPlaying(false); }
      }
      // Fire pending signals based on phase elapsed time
      if (s.pendingSignals) {
        s.pendingSignals.forEach(sig => {
          if (!sig.fired && s.pt >= (sig.delay || 0)) {
            sig.fired = true;
            const f = pos(sig.from), t = pos(sig.to);
            s.activeSignals.push({
              fromX: cx + f.x * sc, fromY: cy + f.y * sc,
              toX: cx + t.x * sc, toY: cy + t.y * sc,
              color: sig.color, dashed: !!sig.dashed,
              t: 0, spd: 0.4, fadeT: 0, alive: true,
              toId: sig.to,
            });
          }
        });
      }
    }

    SERVICES.forEach(sv => { s.h[sv.id] = lerp(s.h[sv.id], s.ht[sv.id], 0.0025 * dt); });
    ECOSYSTEM.forEach(en => {
      s.ecoOpacity[en.id] = lerp(s.ecoOpacity[en.id], s.ecoTargetOpacity[en.id], 0.003 * dt);
    });

    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    bg.addColorStop(0, "#0f1626"); bg.addColorStop(1, BG);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Platform region boundaries
    const platformGroups = { "on-prem": [], "aws": [], "gcp": [], "external": [] };
    SERVICES.forEach(sv => platformGroups[sv.platform].push(sv));
    platformGroups["nthlayer"] = ECOSYSTEM;

    Object.entries(platformGroups).forEach(([plat, nodes]) => {
      if (!nodes.length) return;
      const pc = PLATFORM_COLORS[plat];
      const pad = 30 * sc;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      nodes.forEach(n => {
        const nx = cx + n.x * sc, ny = cy + n.y * sc;
        if (nx < minX) minX = nx; if (ny < minY) minY = ny;
        if (nx > maxX) maxX = nx; if (ny > maxY) maxY = ny;
      });
      const rx = minX - pad, ry = minY - pad, rw = maxX - minX + pad * 2, rh = maxY - minY + pad * 2;
      const radius = 8 * sc;
      ctx.beginPath();
      ctx.moveTo(rx + radius, ry);
      ctx.lineTo(rx + rw - radius, ry); ctx.arcTo(rx + rw, ry, rx + rw, ry + radius, radius);
      ctx.lineTo(rx + rw, ry + rh - radius); ctx.arcTo(rx + rw, ry + rh, rx + rw - radius, ry + rh, radius);
      ctx.lineTo(rx + radius, ry + rh); ctx.arcTo(rx, ry + rh, rx, ry + rh - radius, radius);
      ctx.lineTo(rx, ry + radius); ctx.arcTo(rx, ry, rx + radius, ry, radius);
      ctx.closePath();
      ctx.fillStyle = pc.bg;
      ctx.fill();
      ctx.strokeStyle = pc.border;
      ctx.lineWidth = 0.5 * sc;
      ctx.stroke();
      // Region label
      ctx.fillStyle = pc.label + "55";
      ctx.font = `bold ${7 * sc}px 'JetBrains Mono',monospace`;
      ctx.textAlign = "left"; ctx.textBaseline = "top";
      ctx.fillText(pc.name, rx + 5 * sc, ry + 4 * sc);
    });

    // Spec annotation (Phase 1 only, first 5s)
    if (s.pi === 0 && s.playing) {
      const annoT = s.pt / 1000;
      let annoAlpha = 0;
      if (annoT < 0.5) annoAlpha = annoT / 0.5;
      else if (annoT < 3.5) annoAlpha = 1;
      else if (annoT < 5) annoAlpha = 1 - (annoT - 3.5) / 1.5;
      if (annoAlpha > 0) {
        const nthRegion = ECOSYSTEM[1];
        const ax = cx + nthRegion.x * sc, ay = cy + (nthRegion.y - 45) * sc;
        ctx.globalAlpha = annoAlpha * 0.6;
        ctx.font = `${5.5 * sc}px 'JetBrains Mono',monospace`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = ACCENT;
        ctx.fillText("monitoring infrastructure generated from OpenSRM specs", ax, ay);
        ctx.globalAlpha = 1;
      }
    }

    // Edges
    EDGES.forEach(e => {
      const f = pos(e.from), t = pos(e.to);
      const eh = Math.min(s.h[e.from], s.h[e.to]);
      ctx.beginPath(); ctx.moveTo(cx + f.x * sc, cy + f.y * sc); ctx.lineTo(cx + t.x * sc, cy + t.y * sc);
      ctx.strokeStyle = hRgba(eh, e.critical ? 0.16 : 0.05);
      ctx.lineWidth = (e.critical ? 0.8 : 0.4) * sc; ctx.stroke();
    });

    // Ecosystem inter-component edges
    ECO_EDGES.forEach(e => {
      const f = pos(e.from), t = pos(e.to);
      const opacity = Math.min(s.ecoOpacity[e.from], s.ecoOpacity[e.to]);
      ctx.beginPath();
      ctx.moveTo(cx + f.x * sc, cy + f.y * sc);
      ctx.lineTo(cx + t.x * sc, cy + t.y * sc);
      ctx.strokeStyle = `rgba(136,192,208,${0.12 * opacity})`;
      ctx.lineWidth = 0.6 * sc;
      ctx.stroke();
    });

    // Particles — fade out on degraded edges (lower opacity, not random skip)
    s.particles.forEach(p => {
      const e = EDGES[p.ei]; const f = pos(e.from), t = pos(e.to);
      const eh = Math.min(s.h[e.from], s.h[e.to]);
      p.t += (p.spd * (0.3 + eh * 0.7) * dt) / 3000; if (p.t > 1) p.t -= 1;
      const x = cx + lerp(f.x, t.x, p.t) * sc, y = cy + lerp(f.y, t.y, p.t) * sc;
      // Degraded edges: particles fade and shrink smoothly instead of disappearing
      const pAlpha = eh < 0.6 ? eh * 0.8 : 1;
      const pSize = eh < 0.6 ? p.sz * (0.4 + eh * 0.6) : p.sz;
      ctx.beginPath(); ctx.arc(x, y, pSize * sc * 2, 0, 6.28); ctx.fillStyle = hRgba(eh, 0.08 * pAlpha); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y, pSize * sc, 0, 6.28); ctx.fillStyle = hRgba(eh, pAlpha); ctx.fill();
    });

    // Trace helper
    function drawTrace(paths, traceP, color) {
      const [r, g, b] = color === INC_AI ? [191, 97, 106] : [136, 192, 208];
      // Spawn one trace particle on a random path (not all paths at once)
      if (Math.random() < 0.015) {
        const pi = Math.floor(Math.random() * paths.length);
        traceP.push({ pi, t: 0, spd: 0.18 + Math.random() * 0.12 });
      }
      for (let i = traceP.length - 1; i >= 0; i--) { if (traceP[i].t > 1) traceP.splice(i, 1); }
      paths.forEach(path => {
        ctx.beginPath();
        path.forEach((nid, i) => { const p = pos(nid); i === 0 ? ctx.moveTo(cx + p.x * sc, cy + p.y * sc) : ctx.lineTo(cx + p.x * sc, cy + p.y * sc); });
        ctx.strokeStyle = `rgba(${r},${g},${b},${0.08 + Math.sin(s.time / 300) * 0.05})`;
        ctx.lineWidth = 1.5 * sc; ctx.setLineDash([3 * sc, 2 * sc]); ctx.stroke(); ctx.setLineDash([]);
      });
      traceP.forEach(tp => {
        tp.t += (tp.spd * dt) / 2000;
        const path = paths[tp.pi]; if (!path || path.length < 2) return;
        const segs = path.length - 1, sf = tp.t * segs, si = Math.min(Math.floor(sf), segs - 1), segT = sf - si;
        const fp = pos(path[si]), tp2 = pos(path[si + 1]);
        const x = cx + lerp(fp.x, tp2.x, segT) * sc, y = cy + lerp(fp.y, tp2.y, segT) * sc;
        ctx.beginPath(); ctx.arc(x, y, 3.5 * sc, 0, 6.28); ctx.fillStyle = `rgba(${r},${g},${b},0.12)`; ctx.fill();
        ctx.beginPath(); ctx.arc(x, y, 1.6 * sc, 0, 6.28); ctx.fillStyle = `rgba(${r},${g},${b},0.8)`; ctx.fill();
      });
    }

    if (s.traceAI) drawTrace(tracePathsAI, s.traceAI_P, INC_AI);
    if (s.traceInfra) drawTrace(tracePathsInfra, s.traceInfra_P, INC_INFRA);

    // Active signal lines
    for (let i = s.activeSignals.length - 1; i >= 0; i--) {
      const sig = s.activeSignals[i];
      if (sig.t < 1) {
        sig.t += (sig.spd * dt) / 2000;
        const px = lerp(sig.fromX, sig.toX, sig.t);
        const py = lerp(sig.fromY, sig.toY, sig.t);
        ctx.beginPath(); ctx.moveTo(sig.fromX, sig.fromY); ctx.lineTo(px, py);
        ctx.strokeStyle = sig.color + "55";
        ctx.lineWidth = 1.6 * sc;
        if (sig.dashed) { ctx.setLineDash([4 * sc, 3 * sc]); }
        ctx.stroke();
        if (sig.dashed) { ctx.setLineDash([]); }
        ctx.beginPath(); ctx.arc(px, py, 4 * sc, 0, 6.28);
        ctx.fillStyle = sig.color + "20"; ctx.fill();
        ctx.beginPath(); ctx.arc(px, py, 2 * sc, 0, 6.28);
        ctx.fillStyle = sig.color + "cc"; ctx.fill();
      } else if (sig.fadeT < 2500) {
        sig.fadeT += dt;
        const fadeAlpha = Math.max(0, 1 - sig.fadeT / 2500);
        const alphaHex = Math.round(fadeAlpha * 0x55).toString(16).padStart(2, "0");
        ctx.beginPath(); ctx.moveTo(sig.fromX, sig.fromY); ctx.lineTo(sig.toX, sig.toY);
        ctx.strokeStyle = sig.color + alphaHex;
        ctx.lineWidth = 1.6 * sc;
        if (sig.dashed) { ctx.setLineDash([4 * sc, 3 * sc]); }
        ctx.stroke();
        if (sig.dashed) { ctx.setLineDash([]); }
        if (sig.fadeT < dt * 2) {
          const eNode = ECOSYSTEM.find(e => e.id === sig.toId);
          if (eNode) s.ecoTargetOpacity[eNode.id] = 1.0;
        }
      } else {
        s.activeSignals.splice(i, 1);
      }
    }

    // Nodes
    let curH = null;
    SERVICES.forEach(sv => {
      const x = cx + sv.x * sc, y = cy + sv.y * sc, r = TIER_R[sv.tier] * sc;
      const h = s.h[sv.id], dc = DOMAIN_COLORS[sv.domain];
      const dx = mouse.current.x - x, dy = mouse.current.y - y;
      const isH = dx * dx + dy * dy < (r + 8) * (r + 8); if (isH) curH = sv.id;

      if (h < 0.65) {
        ctx.beginPath(); ctx.arc(x, y, r + 5 * sc, 0, 6.28);
        ctx.fillStyle = `rgba(191,97,106,${(0.06 + Math.sin(s.time / 350) * 0.04) * (1 - h)})`;
        ctx.fill();
      }

      // Budget ring
      ctx.beginPath(); ctx.arc(x, y, r + 1.8 * sc, 0, 6.28);
      ctx.strokeStyle = "rgba(240,240,243,0.035)"; ctx.lineWidth = 1.8 * sc; ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, r + 1.8 * sc, -1.571, -1.571 + h * 6.283);
      ctx.strokeStyle = hRgb(h); ctx.lineWidth = 1.8 * sc; ctx.lineCap = "round"; ctx.stroke(); ctx.lineCap = "butt";

      // Body
      const ng = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, 0, x, y, r);
      ng.addColorStop(0, dc.glow + "30"); ng.addColorStop(1, dc.base + "0a");
      ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fillStyle = ng; ctx.fill();
      ctx.strokeStyle = dc.base + (isH ? "bb" : "55"); ctx.lineWidth = (isH ? 1.2 : 0.6) * sc; ctx.stroke();

      // AI badge
      if (sv.type === "ai-gate") {
        const bx = x + r * 0.7, by = y - r * 0.7;
        // Glow
        ctx.beginPath(); ctx.arc(bx, by, 5.5 * sc, 0, 6.28);
        ctx.fillStyle = "rgba(235,203,139,0.12)"; ctx.fill();
        // Badge background
        ctx.beginPath(); ctx.arc(bx, by, 4 * sc, 0, 6.28);
        ctx.fillStyle = "#ebcb8b"; ctx.fill();
        // Text
        ctx.fillStyle = BG; ctx.font = `bold ${5 * sc}px 'JetBrains Mono',monospace`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("AI", bx, by + 0.3 * sc);
      }

      // Platform badge
      const pc = PLATFORM_COLORS[sv.platform];
      if (sv.platform === "external") {
        const bx = x - r * 0.6, by = y - r * 0.6;
        ctx.beginPath(); ctx.arc(bx, by, 2.5 * sc, 0, 6.28);
        ctx.fillStyle = pc.label + "55"; ctx.fill();
      }

      // LABEL — key fix: larger, high contrast, with dark background
      const label = shortName(sv.id);
      const fontSize = (isH ? 8.5 : 7.5) * sc;
      ctx.font = `${isH ? "bold " : ""}${fontSize}px 'JetBrains Mono',monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      const ly = y + r + 3 * sc;
      // Dark background behind label
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = "rgba(11,17,32,0.75)";
      ctx.fillRect(x - tw / 2 - 2, ly - 1, tw + 4, fontSize + 2);
      // Label text
      ctx.fillStyle = isH ? TEXT1 : "rgba(156,163,175,0.7)";
      ctx.fillText(label, x, ly);
    });

    // Ecosystem nodes
    ECOSYSTEM.forEach(en => {
      const x = cx + en.x * sc, y = cy + en.y * sc;
      const r = TIER_R.standard * sc;
      const opacity = s.ecoOpacity[en.id];
      const dx = mouse.current.x - x, dy = mouse.current.y - y;
      const isH = dx * dx + dy * dy < (r + 8) * (r + 8);
      if (isH) curH = en.id;

      ctx.globalAlpha = opacity;

      // Glow when active
      if (opacity > 0.6) {
        ctx.beginPath(); ctx.arc(x, y, r + 6 * sc, 0, 6.28);
        ctx.fillStyle = en.color + "15";
        ctx.fill();
      }

      if (en.shape === "diamond") {
        // Rotated square
        const ng = ctx.createRadialGradient(x, y - r * 0.2, 0, x, y, r);
        ng.addColorStop(0, en.color + "40"); ng.addColorStop(1, en.color + "0a");
        ctx.beginPath();
        ctx.moveTo(x, y - r); ctx.lineTo(x + r, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r, y);
        ctx.closePath();
        ctx.fillStyle = ng; ctx.fill();
        ctx.strokeStyle = en.color + (isH ? "cc" : "66");
        ctx.lineWidth = (isH ? 1.2 : 0.7) * sc; ctx.stroke();
      } else {
        // Cylinder (database)
        const cw = r * 1.2, ch = r * 1.6, ey = ch * 0.25;
        const ng = ctx.createRadialGradient(x, y, 0, x, y, r);
        ng.addColorStop(0, en.color + "40"); ng.addColorStop(1, en.color + "0a");
        // Body
        ctx.beginPath();
        ctx.moveTo(x - cw, y - ch / 2 + ey); ctx.lineTo(x - cw, y + ch / 2 - ey);
        ctx.quadraticCurveTo(x - cw, y + ch / 2 + ey, x, y + ch / 2 + ey);
        ctx.quadraticCurveTo(x + cw, y + ch / 2 + ey, x + cw, y + ch / 2 - ey);
        ctx.lineTo(x + cw, y - ch / 2 + ey);
        ctx.quadraticCurveTo(x + cw, y - ch / 2 - ey, x, y - ch / 2 - ey);
        ctx.quadraticCurveTo(x - cw, y - ch / 2 - ey, x - cw, y - ch / 2 + ey);
        ctx.closePath();
        ctx.fillStyle = ng; ctx.fill();
        ctx.strokeStyle = en.color + (isH ? "cc" : "66");
        ctx.lineWidth = (isH ? 1.2 : 0.7) * sc; ctx.stroke();
        // Top ellipse
        ctx.beginPath();
        ctx.ellipse(x, y - ch / 2 + ey, cw, ey, 0, 0, 6.28);
        ctx.strokeStyle = en.color + (isH ? "cc" : "44");
        ctx.lineWidth = 0.5 * sc; ctx.stroke();
      }

      // Label — brand colour
      const label = en.label;
      const fontSize = (isH ? 7.5 : 7) * sc;
      ctx.font = `${isH ? "bold " : ""}${fontSize}px 'JetBrains Mono',monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      const ly = y + r + 4 * sc;
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = "rgba(11,17,32,0.75)";
      ctx.fillRect(x - tw / 2 - 2, ly - 1, tw + 4, fontSize + 2);
      ctx.fillStyle = en.color + (isH ? "ff" : "aa");
      ctx.fillText(label, x, ly);

      ctx.globalAlpha = 1;
    });

    if (curH !== s.hovered) { s.hovered = curH; setHovered(curH); }
    frame.current = requestAnimationFrame(animate);
  }, [tracePathsAI, tracePathsInfra, pos]);

  useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const resize = () => {
      const p = c.parentElement; const dpr = window.devicePixelRatio || 1;
      c.width = p.clientWidth * dpr; c.height = p.clientHeight * dpr;
      c.style.width = p.clientWidth + "px"; c.style.height = p.clientHeight + "px";
      c.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    const ro = new ResizeObserver(resize); ro.observe(c.parentElement);
    frame.current = requestAnimationFrame(animate);
    return () => { ro.disconnect(); if (frame.current) cancelAnimationFrame(frame.current); };
  }, [animate]);

  const onMouse = useCallback(e => {
    const r = canvasRef.current?.getBoundingClientRect();
    if (r) mouse.current = { x: e.clientX - r.left, y: e.clientY - r.top };
  }, []);

  const go = useCallback(() => {
    const s2 = st.current;
    s2.playing = true; s2.pi = 0; s2.pt = 0; s2.time = 0; s2.events = [];
    s2.traceAI = false; s2.traceInfra = false; s2.traceAI_P = []; s2.traceInfra_P = [];
    lt.current = null;
    SERVICES.forEach(sv => { s2.h[sv.id] = 1; s2.ht[sv.id] = 1; });
    ECOSYSTEM.forEach(en => { s2.ecoOpacity[en.id] = 0.3; s2.ecoTargetOpacity[en.id] = 0.3; });
    s2.activeSignals = []; s2.pendingSignals = [];
    setPhase(0); setEvents([]); setStarted(true); setPlaying(true);
  }, []);

  const toggle = useCallback(() => {
    if (!started) { go(); return; }
    const s2 = st.current;
    if (!s2.playing && s2.pi >= PHASES.length - 1) { go(); return; }
    s2.playing = !s2.playing; setPlaying(s2.playing);
  }, [started, go]);

  const cp = PHASES[phase];
  const hovSvc = hovered ? SERVICES.find(s => s.id === hovered) : null;
  const hovEco = hovered ? ECOSYSTEM.find(e => e.id === hovered) : null;
  const hovH = hovered ? st.current.h[hovered] : 1;
  const FONT = "'JetBrains Mono',monospace";

  return (
    <div style={{ width: "100%", height: "100%", minHeight: 400, background: BG, position: "relative", overflow: "hidden", fontFamily: FONT }}>
      <div style={{ position: "absolute", inset: 0 }}>
        <canvas ref={canvasRef} onMouseMove={onMouse} style={{ display: "block", cursor: hovered ? "pointer" : "default" }} />
      </div>

      {/* Header */}
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "7px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", background: `linear-gradient(to bottom,rgba(11,17,32,0.93),transparent)`, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 5, height: 5, borderRadius: "50%", background: playing ? "#a3be8c" : ACCENT, boxShadow: `0 0 6px ${playing ? "#a3be8c" : ACCENT}` }} />
          <span style={{ color: TEXT1, fontSize: 10, fontWeight: 600, letterSpacing: 1.5 }}>NTHLAYER</span>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {Object.entries(DOMAIN_COLORS).map(([n, c]) => (
            <div key={n} style={{ display: "flex", alignItems: "center", gap: 2 }}>
              <div style={{ width: 4, height: 4, borderRadius: 1, background: c.base, opacity: 0.6 }} />
              <span style={{ color: TEXT3, fontSize: 6.5 }}>{n}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Phase */}
      {started && (
        <div style={{ position: "absolute", top: 26, left: 12, zIndex: 10, maxWidth: 250 }}>
          <div style={{ color: cp.color, fontSize: 7.5, fontWeight: 700, letterSpacing: 1.8, display: "flex", alignItems: "center", gap: 4 }}>
            {(cp.color === "#bf616a" || cp.color === "#ebcb8b") && <span style={{ width: 4, height: 4, borderRadius: "50%", background: cp.color, animation: "pulse 1s infinite", display: "inline-block" }} />}
            {cp.label}
          </div>
          <div style={{ color: TEXT4, fontSize: 7, lineHeight: 1.3, marginTop: 2 }}>{cp.desc}</div>
        </div>
      )}

      {/* Incident legend */}
      {(phase === 2 || phase === 3) && started && (
        <div style={{ position: "absolute", top: 26, right: 12, zIndex: 10, display: "flex", flexDirection: "column", gap: 2 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 8, height: 2, background: INC_AI, borderRadius: 1 }} />
            <span style={{ color: TEXT4, fontSize: 6.5 }}>INC-4821 model</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 8, height: 2, background: INC_INFRA, borderRadius: 1 }} />
            <span style={{ color: TEXT4, fontSize: 6.5 }}>INC-4822 config</span>
          </div>
        </div>
      )}

      {/* Events */}
      {events.length > 0 && (
        <div style={{ position: "absolute", bottom: 42, left: 12, zIndex: 10, display: "flex", flexDirection: "column", gap: 2, maxWidth: "72%" }}>
          {events.map((ev, i) => (
            <div key={i} style={{
              display: "flex", gap: 4, alignItems: "flex-start",
              color: i >= events.length - (PHASES[phase]?.events?.length || 0) ? TEXT2 : TEXT3,
              fontSize: 6.5, padding: "2px 6px",
              background: i >= events.length - (PHASES[phase]?.events?.length || 0) ? "rgba(11,17,32,0.75)" : "rgba(11,17,32,0.4)",
              borderLeft: `2px solid ${ev.color}`, borderRadius: "0 2px 2px 0", lineHeight: 1.35,
            }}>
              <span style={{ color: ev.color, fontSize: 5.5, fontWeight: 700, flexShrink: 0, marginTop: 1, letterSpacing: 0.3 }}>{ev.tag}</span>
              <span>{ev.text}</span>
            </div>
          ))}
        </div>
      )}

      {/* Hover */}
      {(hovSvc || hovEco) && (
        <div style={{ position: "absolute", bottom: 42, right: 12, zIndex: 10, background: "rgba(11,17,32,0.9)", border: `1px solid ${BORDER}`, borderRadius: 5, padding: "5px 9px", minWidth: 105, backdropFilter: "blur(6px)" }}>
          <div style={{ color: TEXT1, fontSize: 8.5, fontWeight: 600, marginBottom: 3 }}>{hovSvc ? hovSvc.id : hovEco.id}</div>
          {hovSvc ? (
            <>
              {[["PLATFORM", hovSvc.platform], ["TIER", hovSvc.tier], ["TYPE", hovSvc.type]].map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                  <span style={{ color: TEXT3, fontSize: 6.5 }}>{k}</span>
                  <span style={{ color: TEXT4, fontSize: 6.5 }}>{v}</span>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                <span style={{ color: TEXT3, fontSize: 6.5 }}>HEALTH</span>
                <span style={{ color: hRgb(hovH), fontSize: 6.5 }}>{(hovH * 100).toFixed(1)}%</span>
              </div>
            </>
          ) : (
            <>
              {[["COMPONENT", hovEco.label], ["SHAPE", hovEco.shape], ["ROLE", hovEco.shape === "cylinder" ? "data store" : "agent"]].map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                  <span style={{ color: TEXT3, fontSize: 6.5 }}>{k}</span>
                  <span style={{ color: hovEco.color, fontSize: 6.5 }}>{v}</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {/* Controls */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "7px 12px", background: `linear-gradient(to top,rgba(11,17,32,0.94),transparent)`, zIndex: 10, display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={toggle} style={{
          width: 26, height: 26, borderRadius: "50%", border: `1px solid rgba(136,192,208,0.3)`,
          background: "rgba(136,192,208,0.08)", color: TEXT1, cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, flexShrink: 0, lineHeight: 1,
        }}>{!started ? "▶" : playing ? "⏸" : "▶"}</button>
        {started && <button onClick={go} style={{
          width: 20, height: 20, borderRadius: "50%", border: `1px solid ${BORDER}`,
          background: "transparent", color: TEXT3, cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, flexShrink: 0,
        }}>↺</button>}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
          <div style={{ display: "flex", gap: 1, height: 2 }}>
            {PHASES.map((p, i) => {
              const prog = i < phase ? 1 : i === phase && st.current.playing ? clamp(st.current.pt / p.dur, 0, 1) : 0;
              return <div key={i} style={{ flex: p.dur, height: 2, borderRadius: 1, background: prog >= 1 ? ACCENT : prog > 0 ? `linear-gradient(to right,${ACCENT} ${prog * 100}%,${BORDER} ${prog * 100}%)` : BORDER }} />;
            })}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            {PHASES.map((p, i) => <span key={i} style={{ fontSize: 5.5, color: i === phase ? TEXT4 : BORDER }}>{p.name}</span>)}
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexShrink: 0 }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end" }}>
            <span style={{ color: TEXT3, fontSize: 5.5, letterSpacing: 0.5 }}>SERVICES</span>
            <span style={{ color: TEXT2, fontSize: 11, fontWeight: 300 }}>{SERVICES.length}</span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end" }}>
            <span style={{ color: ACCENT, fontSize: 5.5, letterSpacing: 0.5 }}>NTHLAYER</span>
            <span style={{ color: ACCENT, fontSize: 11, fontWeight: 300 }}>{ECOSYSTEM.length}</span>
          </div>
        </div>
      </div>

      {/* Start overlay */}
      {!started && (
        <div onClick={toggle} style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 20, background: "rgba(11,17,32,0.4)", cursor: "pointer" }}>
          <div style={{ color: TEXT1, fontSize: 15, fontWeight: 200, letterSpacing: 5, marginBottom: 4 }}>NTHLAYER</div>
          <div style={{ color: TEXT3, fontSize: 7.5, letterSpacing: 1.2, marginBottom: 20 }}>DEFENSE-IN-DEPTH FOR AI AGENT SYSTEMS</div>
          <div style={{ width: 38, height: 38, borderRadius: "50%", border: `1px solid rgba(136,192,208,0.3)`, background: "rgba(136,192,208,0.06)", display: "flex", alignItems: "center", justifyContent: "center", color: TEXT1, fontSize: 13, marginBottom: 12 }}>▶</div>
          <div style={{ color: BORDER, fontSize: 7.5, letterSpacing: 0.6 }}>CLICK TO START SCENARIO</div>
        </div>
      )}

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(NthLayerViz));
</script>
</body>
</html>
